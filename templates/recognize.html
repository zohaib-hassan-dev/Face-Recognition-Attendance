<!DOCTYPE html>
<html>
<head>
  <title>Mark Attendance</title>
  <style>
    body { text-align: center; font-family: Arial, sans-serif; background-color: #f5f5f5; padding-top: 50px; }
    video, canvas { border: 1px solid #ddd; margin: 10px; }
    button { padding: 10px 20px; font-size: 16px; margin: 10px; border: none; border-radius: 8px; background-color: #4CAF50; color: white; cursor: pointer; }
    button:hover { background-color: #45a049; }
    #result { margin-top: 20px; font-size: 18px; color: #333; }
    h2 { color: #333; }
  </style>
</head>
<body>
  <h2>Mark Attendance</h2>
  <p>Click the button to capture your face from camera and mark attendance.</p>
  <video id="video" width="320" height="240" autoplay></video>
  <br>
  <button onclick="captureAndRecognize()">Capture & Recognize</button>
  <br>
  <div id="result"></div>

  <script>
    const video = document.getElementById('video');
    const resultDiv = document.getElementById('result');

    // Start camera
    navigator.mediaDevices.getUserMedia({ video: true }).then(stream => {
      video.srcObject = stream;
    }).catch(err => {
      resultDiv.innerHTML = '<p style="color:red;">Camera access denied or not available.</p>';
    });

    function captureAndRecognize() {
      const canvas = document.createElement('canvas');
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      canvas.getContext('2d').drawImage(video, 0, 0);
      const dataUrl = canvas.toDataURL('image/png');

      fetch('/recognize_image', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ image: dataUrl })
      })
      .then(response => {
        if (!response.ok) {
          return response.json().then(err => Promise.reject(err));  // Handle 400 errors as JSON
        }
        return response.json();
      })
      .then(data => {
        if (data.status === 'ok') {
          resultDiv.innerHTML = `<p style="color:green;">${data.message}</p>`;
        } else {
          resultDiv.innerHTML = `<p style="color:orange;">${data.message}</p>`;
        }
      })
      .catch(err => {
        resultDiv.innerHTML = `<p style="color:red;">Error: ${err.message || err}</p>`;
      });
    }
  </script>
  <br>
  <button onclick="window.location.href='/'">Go Back</button>
</body>
</html>

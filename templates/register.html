<!DOCTYPE html>
<html>
<head>
  <title>Register Face</title>
  <style>
    body { text-align: center; font-family: Arial, sans-serif; background-color: #f5f5f5; padding-top: 50px; }
    input { padding: 10px; margin: 10px; border: 1px solid #ccc; border-radius: 5px; width: 200px; }
    video, canvas { border: 1px solid #ddd; margin: 10px; }
    button { padding: 10px 20px; font-size: 16px; margin: 10px; border: none; border-radius: 8px; background-color: #4CAF50; color: white; cursor: pointer; }
    button:hover { background-color: #45a049; }
    #result { margin-top: 20px; font-size: 18px; color: #333; }
    h2 { color: #333; }
  </style>
</head>
<body>
  <h2>Register a New User</h2>
  <p>Enter your name and click capture to register your face.</p>
  <input type="text" id="nameInput" placeholder="Enter your name" required>
  <br>
  <video id="video" width="320" height="240" autoplay></video>
  <br>
  <button onclick="captureAndRegister()">Capture & Register</button>
  <br>
  <div id="result"></div>

  <script>
    const video = document.getElementById('video');
    const resultDiv = document.getElementById('result');
    const nameInput = document.getElementById('nameInput');

    // Start camera
    navigator.mediaDevices.getUserMedia({ video: true }).then(stream => {
      video.srcObject = stream;
    }).catch(err => {
      resultDiv.innerHTML = '<p style="color:red;">Camera access denied or not available. Using server camera fallback.</p>';
    });

    function captureAndRegister() {
      const name = nameInput.value.trim();
      if (!name) {
        resultDiv.innerHTML = '<p style="color:red;">Please enter your name!</p>';
        return;
      }

      const canvas = document.createElement('canvas');
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      canvas.getContext('2d').drawImage(video, 0, 0);
      const dataUrl = canvas.toDataURL('image/png');

      fetch('/register_user', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: name, image: dataUrl })
      })
      .then(response => {
        if (!response.ok) {
          return response.json().then(err => Promise.reject(err));
        }
        return response.json();
      })
      .then(data => {
        if (data.status === 'ok') {
          resultDiv.innerHTML = `<p style="color:green;">${data.message}</p>`;
          nameInput.value = '';  // Clear for next
        }
      })
      .catch(err => {
        resultDiv.innerHTML = `<p style="color:red;">Error: ${err.message || err}</p>`;
      });
    }
  </script>
  <br>
  <button onclick="window.location.href='/'">Go Back</button>
</body>
</html>
